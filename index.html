<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basics of Data Science — Final Exam</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="landing">
  <div class="landing-stage">
    <div class="card glass-strong landing-split animate-in">
      <div class="landing-info">
        <h1 class="landing-title">Basics of<br>Data Science</h1>
        <p class="landing-exam-title">Final Exam</p>

        <div class="landing-meta">
          <div class="landing-meta-item">
            <span class="banner-meta-icon icon" data-icon="teacher"></span>
            <span>Instructor: <strong>Masoud Ahangary</strong></span>
          </div>
          <div class="landing-meta-item">
            <span class="banner-meta-icon icon" data-icon="clipboard"></span>
            <span><strong>35</strong> Questions · Shuffled order</span>
          </div>
          <div class="landing-meta-item">
            <span class="banner-meta-icon icon" data-icon="clock"></span>
            <span>~<strong>60</strong> minutes · <strong>60%</strong> to pass</span>
          </div>
        </div>

        <form id="start-form">
          <div class="form-group hidden" id="exam-code-group">
            <label for="exam-code"><span class="icon" data-icon="lock"></span>Exam access code</label>
            <div class="input-wrap">
              <input
                type="password"
                id="exam-code"
                placeholder="Enter code from your instructor"
                autocomplete="off"
                maxlength="64"
              >
              <button type="button" class="input-toggle icon" id="exam-code-toggle" data-icon="eye" aria-label="Show code" aria-pressed="false"></button>
            </div>
            <p class="error-msg" id="code-error">Please enter the exam access code.</p>
          </div>
          <div class="form-group">
            <label for="student-name">Enter your full name to begin</label>
            <input
              type="text"
              id="student-name"
              placeholder="e.g. Sara Ahmadi"
              autocomplete="name"
              required
              minlength="2"
              maxlength="80"
            >
            <p class="error-msg" id="name-error">Please enter your full name (at least 2 characters).</p>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Start Exam →</button>
        </form>
      </div>

      <div class="landing-divider" aria-hidden="true"></div>

      <div class="landing-visual">
        <img src="assets/data-science-hero-vertical.png" alt="Data science visualizations — charts, scatter plot, and distribution curve" loading="lazy">
      </div>
    </div>
  </div>

  <script src="js/icons.js"></script>
  <script src="js/config.js"></script>
  <script>
    (function () {
      const cfg = window.EXAM_CONFIG || {};
      const codeGroup = document.getElementById('exam-code-group');

      if (cfg.REQUIRE_EXAM_CODE && codeGroup) {
        codeGroup.classList.remove('hidden');
        document.getElementById('exam-code').required = true;
      }

      const codeInput = document.getElementById('exam-code');
      const codeToggle = document.getElementById('exam-code-toggle');
      if (codeInput && codeToggle) {
        codeToggle.addEventListener('click', function () {
          const show = codeInput.type === 'password';
          codeInput.type = show ? 'text' : 'password';
          codeToggle.setAttribute('aria-pressed', String(show));
          codeToggle.setAttribute('aria-label', show ? 'Hide code' : 'Show code');
          codeToggle.setAttribute('data-icon', show ? 'eye-off' : 'eye');
          if (window.Icons) window.Icons.hydrate(codeToggle.parentNode);
          codeInput.focus();
        });
      }

      document.getElementById('start-form').addEventListener('submit', function (e) {
        e.preventDefault();
        const nameInput = document.getElementById('student-name');
        const errorEl = document.getElementById('name-error');
        const codeErrorEl = document.getElementById('code-error');
        const name = nameInput.value.trim();

        if (name.length < 2) {
          errorEl.classList.add('visible');
          nameInput.focus();
          return;
        }
        errorEl.classList.remove('visible');

        if (cfg.REQUIRE_EXAM_CODE) {
          const code = document.getElementById('exam-code').value.trim();
          if (!code) {
            codeErrorEl.classList.add('visible');
            document.getElementById('exam-code').focus();
            return;
          }
          codeErrorEl.classList.remove('visible');
          sessionStorage.setItem('examAccessCode', code);
        } else {
          sessionStorage.removeItem('examAccessCode');
        }

        if (!cfg.GRADE_API_URL || cfg.GRADE_API_URL.includes('YOUR_PROJECT') || cfg.GRADE_API_URL.includes('REPLACE_ME')) {
          alert('Exam is not fully configured. Set GRADE_API_URL in js/config.js to your Vercel API URL, then push to GitHub.');
          return;
        }

        sessionStorage.setItem('examStudentName', name);
        sessionStorage.removeItem('examAnswers');
        sessionStorage.removeItem('examSubmitted');
        sessionStorage.removeItem('examResults');
        sessionStorage.removeItem('examShuffle');
        sessionStorage.removeItem('examMarked');
        sessionStorage.setItem('examStartTime', Date.now().toString());
        window.location.href = 'exam.html';
      });
    })();
  </script>
</body>
</html>
